ssh:
  hosts:
    # -------------------------------------------------------------------------
    # Applied on every machine regardless of OS or context
    # -------------------------------------------------------------------------
    common:
      - name: "github.com"
        comment: "GitHub – always use SSH key auth"
        options:
          User: git

    # -------------------------------------------------------------------------
    # macOS (darwin) only
    # -------------------------------------------------------------------------
    darwin: []
